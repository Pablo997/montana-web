name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run when a new commit lands on the same PR
# branch. Saves CI minutes and keeps feedback loops short.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback loop: lint + types + unit tests in a single job so
  # setup (checkout + npm ci) only happens once. If this starts taking
  # >3 min, split into parallel jobs sharing a cached node_modules.
  quality:
    name: Lint, types & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Uses package-lock.json as the cache key; any dependency
          # change invalidates it and forces a fresh install.
          cache: 'npm'

      # `npm ci` is strict about lockfile integrity, which is exactly
      # what we want on CI. Falls back to a hard error rather than
      # silently upgrading a transitive dep.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

  # End-to-end smokes run as a separate job so a slow Playwright
  # install doesn't block the quality gate above. Gated by a boolean
  # input on manual dispatches and always on for PRs, because flaky
  # browser tests are better caught early than at deploy time.
  e2e:
    name: Playwright smokes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on pushes to main — it's a wasted run right after a PR
    # merged that just passed the same job.
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded browser binaries across runs. Playwright
      # pins the browser version to its own npm package version, so
      # hashing that package is enough for a stable cache key.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Needs Supabase + MapTiler env vars to render the home page
      # without crashing. We set them as GitHub Actions secrets on the
      # repo so the smokes can actually boot the app. If a secret is
      # missing the job fails loudly on `npm run build` — which is
      # preferable to a mysterious runtime error.
      - name: Run smokes
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}
        run: npm run test:e2e

      # Upload the HTML report on failure so you can see the stack
      # traces, screenshots, and traces without re-running locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Lighthouse CI: performance / a11y / SEO / best-practices budgets
  # against the production build. Split from `e2e` because lhci boots
  # its own server and we don't want the two fighting over :3000, and
  # because lhci is tuned for warnings (performance is noisy on a cold
  # GitHub runner) while smokes are strict.
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build once so `lhci autorun`'s `startServerCommand: npm start`
      # has a `.next/` to serve. Keeping build + lhci in separate
      # steps makes failures easier to triage from the Actions log.
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}
        run: npm run build

      # LHCI_GITHUB_APP_TOKEN is optional — if set, lhci posts score
      # deltas as a GitHub status check. Without it the job still
      # passes/fails on its asserts, it just won't decorate the PR.
      - name: Run Lighthouse CI
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: npx lhci autorun

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
